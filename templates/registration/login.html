{% load static %}
{% load crispy_forms_filters %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auth | Museum</title>

    <link rel="stylesheet" href="{% static 'museum/css/auth.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body class="auth-page">

<div class="auth-center">

    <div class="auth-card">

        <h1>🏛 Museum Access</h1>

        {% if form.errors %}
            <div class="auth-error">Wrong credentials</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            {{ form|crispy }}

            <button type="submit" class="btn auth-btn">
                Login
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>

    </div>

</div>

</body>
</html>
