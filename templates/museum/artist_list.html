{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Artists</h2>
    <a href="{% url 'museum:artist-create' %}" class="btn btn-primary">
        +
    </a>
</div>

<div class="list-group">

    {% for artist in artist_list %}
        <div class="list-group-item d-flex justify-content-between align-items-center">

            <a href="{% url 'museum:artist-detail' artist.id %}" class="h5 mb-0 text-dark">
                {{ artist.first_name }} {{ artist.last_name }}
            </a>

            <div>
                <a href="{% url 'museum:artist-update' artist.id %}" class="btn btn-sm btn-outline-secondary mr-2">
                    Update
                </a>
                <a href="{% url 'museum:artist-delete' artist.id %}" class="btn btn-sm btn-outline-danger">
                    Delete
                </a>
            </div>

        </div>
    {% empty %}
        <div class="list-group-item text-muted">
            No artists found.
        </div>
    {% endfor %}

</div>

{% if is_paginated %}

<nav class="mt-4">

    <ul class="pagination justify-content-center">

    </ul>

</nav>

{% endif %}

{% endblock %}
