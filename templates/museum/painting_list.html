{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Paintings</h2>
    <a href="{% url 'museum:painting-create' %}" class="btn btn-primary">
        +
    </a>
</div>

<div class="list-group">

    {% for painting in painting_list %}
        <div class="list-group-item d-flex justify-content-between align-items-center">

            <a href="{% url 'museum:painting-detail' painting.id %}" class="h5 mb-0 text-dark">
                {{ painting.title }}
                {% if painting.year_created %}
                    <small class="text-muted">({{ painting.year_created }})</small>
                {% endif %}
            </a>

            <div>
                <a href="{% url 'museum:painting-update' painting.id %}" class="btn btn-sm btn-outline-secondary mr-2">
                    Update
                </a>

                <a href="{% url 'museum:painting-delete' painting.id %}" class="btn btn-sm btn-outline-danger">
                    Delete
                </a>
            </div>

        </div>
    {% empty %}
        <div class="list-group-item text-muted">
            No paintings found.
        </div>
    {% endfor %}

</div>

{% if is_paginated %}

<nav class="mt-4">

    <ul class="pagination justify-content-center">

    </ul>

</nav>

{% endif %}

{% endblock %}
