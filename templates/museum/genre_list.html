{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Genres</h2>
    <a href="{% url 'museum:genre-create' %}" class="btn btn-primary">
        +
    </a>
</div>

<div class="list-group">

    {% for genre in genre_list %}
        <div class="list-group-item d-flex justify-content-between align-items-center">

            <a href="{% url 'museum:genre-detail' genre.id %}" class="h5 mb-0 text-dark">
              {{ genre.name }}
            </a>

            <div>
                <a href="{% url 'museum:genre-update' genre.id %}" class="btn btn-sm btn-outline-secondary mr-2">
                    Update
                </a>

                <a href="{% url 'museum:genre-delete' genre.id %}" class="btn btn-sm btn-outline-danger">
                    Delete
                </a>
            </div>

        </div>
    {% empty %}
        <div class="list-group-item text-muted">
            No genres found.
        </div>
    {% endfor %}

</div>

{% if is_paginated %}

<nav class="mt-4">

    <ul class="pagination justify-content-center">

    </ul>

</nav>

{% endif %}

{% endblock %}
