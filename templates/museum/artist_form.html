{% extends 'base.html' %}

{% block content %}

<h2>
    {% if form.instance.pk %}
        Edit Artist
    {% else %}
        New Artist
    {% endif %}
</h2>

<form method="post" class="card p-4 shadow-sm bg-light mt-3">

    {% csrf_token %}

    {{ form }}

    <div class="mt-3">
        <button type="submit" class="btn btn-success">
            Save
        </button>

        <a href="{% url 'museum:artists' %}" class="btn btn-secondary ml-2">
            Cancel
        </a>
    </div>

</form>

{% endblock %}
