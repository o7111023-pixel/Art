{% extends 'base.html' %}

{% block content %}

<div class="card border-danger shadow-sm">

    <div class="card-header bg-danger text-white">
        Confirm Delete
    </div>

    <div class="card-body">

        <h5>
            Are you sure you want to delete painting "{{ object.title }}"?
        </h5>

        <p class="text-muted">
            This action cannot be undone.
        </p>

        <form method="post" class="mt-3">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Yes, Delete
            </button>

            <a href="{% url 'museum:paintings' %}" class="btn btn-secondary ml-2">
                Cancel
            </a>
        </form>

    </div>

</div>

{% endblock %}
